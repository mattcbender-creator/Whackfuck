kind = "web"
previewPath = "/"
title = "WFC – Whack Fuck Cup"
version = "1.0.0"
id = "artifacts/wfc-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21538

[services.development]
run = "pnpm --filter @workspace/wfc-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wfc-app", "run", "build" ]
publicDir = "artifacts/wfc-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21538"
BASE_PATH = "/"
